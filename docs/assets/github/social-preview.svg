<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent Harness social preview</title>
  <desc id="desc">Adapter-driven control plane for coding-agent work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0b1726"/>
      <stop offset="1" stop-color="#10231f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M80 500H1200" stroke="#1f2937" stroke-width="1"/>
  <path d="M80 140H1200" stroke="#1f2937" stroke-width="1"/>
  <path d="M132 498V142M372 498V142M612 498V142M852 498V142M1092 498V142" stroke="#142033" stroke-width="1"/>

