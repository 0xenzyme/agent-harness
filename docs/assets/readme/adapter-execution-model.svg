<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Harness product loop</title>
  <desc id="desc">The user sets direction, Agent Harness carries accepted work forward, and the project receives verified progress and synchronized state. Harness returns to the user only when human judgment or authority is required.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 46px; font-weight: 720; letter-spacing: -1.2px; fill: #132033; }
      .subtitle { font-size: 21px; font-weight: 430; fill: #526173; }
      .label { font-size: 16px; font-weight: 700; letter-spacing: 1.5px; fill: #0f766e; }
      .stage-title { font-size: 30px; font-weight: 700; letter-spacing: -0.4px; fill: #132033; }
      .stage-copy { font-size: 18px; font-weight: 450; fill: #526173; }
      .harness-label { font-size: 16px; font-weight: 700; letter-spacing: 1.5px; fill: #99f6e4; }
      .harness-title { font-size: 38px; font-weight: 730; letter-spacing: -0.7px; fill: #ffffff; }
      .harness-copy { font-size: 19px; font-weight: 520; fill: #e6fffb; }
      .note-title { font-size: 21px; font-weight: 700; fill: #132033; }
      .note-copy { font-size: 17px; font-weight: 450; fill: #526173; }
    </style>
  </defs>

  <rect width="1440" height="720" fill="#f7f9fc"/>
  <rect x="0" y="0" width="18" height="720" fill="#0f766e"/>

  <text x="72" y="82" class="title">From direction to verified progress</text>
  <text x="72" y="119" class="subtitle">Harness carries the execution burden while the human keeps product judgment.</text>

  <line x1="368" y1="343" x2="466" y2="343" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="974" y1="343" x2="1072" y2="343" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <text x="72" y="239" class="label">YOU</text>
    <text x="72" y="284" class="stage-title">Set direction</text>
    <text x="72" y="327" class="stage-copy">Desired outcome</text>
    <text x="72" y="361" class="stage-copy">Constraints and boundaries</text>
    <text x="72" y="395" class="stage-copy">True pause conditions</text>
    <line x1="72" y1="427" x2="330" y2="427" stroke="#cbd5e1"/>
    <text x="72" y="462" class="stage-copy">You decide what matters.</text>
  </g>

  <g>
    <rect x="470" y="178" width="500" height="330" rx="16" fill="#0f766e"/>
    <text x="514" y="226" class="harness-label">AGENT HARNESS</text>
    <text x="514" y="270" class="harness-title">Carries accepted work</text>
    <text x="514" y="310" class="harness-title">forward</text>

    <circle cx="524" cy="350" r="5" fill="#5eead4"/>
    <text x="544" y="357" class="harness-copy">Keeps scope and completion conditions explicit</text>
    <circle cx="524" cy="391" r="5" fill="#5eead4"/>
    <text x="544" y="398" class="harness-copy">Drives the next safe unit of work</text>
    <circle cx="524" cy="432" r="5" fill="#5eead4"/>
    <text x="544" y="439" class="harness-copy">Verifies evidence before advancing state</text>
    <circle cx="524" cy="473" r="5" fill="#5eead4"/>
    <text x="544" y="480" class="harness-copy">Synchronizes the project for the next handoff</text>
  </g>

  <g>
    <text x="1072" y="239" class="label">YOUR PROJECT</text>
    <text x="1072" y="284" class="stage-title">Stays current</text>
    <text x="1072" y="327" class="stage-copy">Verified changes</text>
    <text x="1072" y="361" class="stage-copy">Inspectable evidence</text>
    <text x="1072" y="395" class="stage-copy">Synchronized state</text>
    <line x1="1072" y1="427" x2="1330" y2="427" stroke="#cbd5e1"/>
    <text x="1072" y="462" class="stage-copy">The next safe action is clear.</text>
  </g>

  <g>
    <rect x="242" y="570" width="956" height="92" rx="12" fill="#eaf4f2"/>
    <text x="282" y="609" class="note-title">Harness returns only when human judgment or authority is required.</text>
    <text x="282" y="639" class="note-copy">Unclear direction · credentials · paid APIs · production · destructive actions · delivery authorization</text>
  </g>
</svg>
