<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Harness configured artifact map</title>
  <desc id="desc">The Harness config selects a project adapter, which resolves project-local Goal index, specification, milestone, Goal, Run, gate, status, and mental-model paths.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 44px; font-weight: 720; letter-spacing: -1.1px; fill: #132033; }
      .subtitle { font-size: 20px; font-weight: 430; fill: #526173; }
      .label { font-size: 15px; font-weight: 700; letter-spacing: 1.3px; fill: #0f766e; }
      .label-light { font-size: 15px; font-weight: 700; letter-spacing: 1.3px; fill: #99f6e4; }
      .block-title { font-size: 28px; font-weight: 700; fill: #132033; }
      .block-title-light { font-size: 28px; font-weight: 700; fill: #ffffff; }
      .block-copy { font-size: 17px; font-weight: 450; fill: #526173; }
      .block-copy-light { font-size: 17px; font-weight: 450; fill: #e6fffb; }
      .path-title { font-size: 18px; font-weight: 680; fill: #132033; }
      .path { font-size: 15px; font-weight: 500; fill: #526173; }
      .footer { font-size: 18px; font-weight: 600; fill: #263243; }
    </style>
  </defs>

  <rect width="1440" height="720" fill="#f7f9fc"/>
  <rect x="0" y="0" width="18" height="720" fill="#0f766e"/>

  <text x="72" y="78" class="title">Configured artifact paths</text>
  <text x="72" y="114" class="subtitle">The adapter resolves project-local files; plugin core does not hard-code them.</text>

  <line x1="376" y1="354" x2="462" y2="354" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="820" y1="354" x2="906" y2="354" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="72" y="222" width="300" height="264" rx="14" fill="#ffffff" stroke="#b8c4d4" stroke-width="1.5"/>
    <text x="108" y="267" class="label">MACHINE ENTRY</text>
    <text x="108" y="312" class="block-title">Harness Config</text>
    <text x="108" y="354" class="block-copy">.harness/config.json</text>
    <line x1="108" y1="382" x2="336" y2="382" stroke="#d7dee8"/>
    <text x="108" y="419" class="block-copy">Contract type</text>
    <text x="108" y="451" class="block-copy">Adapter location</text>
  </g>

  <g>
    <rect x="466" y="198" width="350" height="312" rx="16" fill="#0f766e"/>
    <text x="506" y="247" class="label-light">LOCAL POLICY</text>
    <text x="506" y="294" class="block-title-light">Project Adapter</text>
    <text x="506" y="339" class="block-copy-light">Declares artifact paths</text>
    <text x="506" y="374" class="block-copy-light">Adds project boundaries</text>
    <text x="506" y="409" class="block-copy-light">Defines verification and gates</text>
    <line x1="506" y1="439" x2="776" y2="439" stroke="#5eead4" stroke-opacity="0.5"/>
    <text x="506" y="474" class="block-copy-light">Keeps protocol project-neutral</text>
  </g>

  <g>
    <rect x="910" y="166" width="458" height="376" rx="14" fill="#ffffff" stroke="#b8c4d4" stroke-width="1.5"/>
    <text x="950" y="211" class="label">RESOLVED PROJECT ARTIFACTS</text>

    <text x="950" y="260" class="path-title">Goal Index</text>
    <text x="950" y="286" class="path">harness/tasks.md</text>
    <text x="950" y="335" class="path-title">Specs + Goals</text>
    <text x="950" y="361" class="path">harness/specs/</text>
    <text x="950" y="383" class="path">harness/goals/</text>
    <text x="950" y="430" class="path-title">Milestones</text>
    <text x="950" y="456" class="path">harness/milestones/</text>

    <text x="1170" y="260" class="path-title">Runs + Gates</text>
    <text x="1170" y="286" class="path">.harness/runs/</text>
    <text x="1170" y="335" class="path-title">Current Status</text>
    <text x="1170" y="361" class="path">harness/status.md</text>
    <text x="1170" y="410" class="path-title">Mental Models</text>
    <text x="1170" y="436" class="path">adapter-defined</text>

    <line x1="950" y1="474" x2="1328" y2="474" stroke="#d7dee8"/>
    <text x="1139" y="507" class="path" text-anchor="middle">Fixed and adapter contracts resolve through the same protocol.</text>
  </g>

  <text x="720" y="628" class="footer" text-anchor="middle">Project facts and execution evidence stay local, inspectable, and replaceable by configuration.</text>
</svg>
