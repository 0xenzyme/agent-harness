[
  {
    "id": "ah_behavior_orient_read_only",
    "skill": "harness:orient",
    "scenario": "Orientation reads configured durable state without mutation.",
    "user_request": "Inspect Harness state and tell me the next entry.",
    "trace": [
      { "type": "read", "target": ".harness/config.json" },
      { "type": "read", "target": "harness/status.md" },
      { "type": "closeout", "target": "read-only route recommendation", "markers": ["harness-rule:durable-tier-boundary"] }
    ],
    "assertions": {
      "required_ordered_reads": [".harness/config.json", "harness/status.md"],
      "forbidden_writes": ["harness/tasks.md", "harness/status.md", ".harness/runs/**"],
      "forbidden_mutations": ["goal-create", "run-prepare", "accepted-state-write"]
    }
  },
  {
    "id": "ah_behavior_execute_runtime_owned_candidate",
    "skill": "harness:execute",
    "scenario": "A durable Run exposes ready ownership while runtime-selected execution returns candidate evidence.",
    "user_request": "Execute this accepted durable Goal.",
    "trace": [
      { "type": "read", "target": "harness/goals/accepted-goal.md" },
      { "type": "read", "target": ".harness/runs/example/dag.json" },
      { "type": "status_snapshot", "target": "ready DAG state", "markers": ["harness-rule:run-dag-ownership"], "fields": { "ready_nodes": ["worker"], "ownership": "accepted scope", "runtime_owns_scheduling": true } },
      { "type": "worker_result", "target": "runtime-selected result", "markers": ["harness-rule:candidate-accepted-evidence"], "fields": { "candidate_evidence": true, "implementer_output": "focused patch", "validation": "tests passed" } }
    ],
    "assertions": {
      "required_ordered_reads": ["harness/goals/accepted-goal.md", ".harness/runs/example/dag.json"],
      "forbidden_writes": ["harness/tasks.md", "harness/status.md"],
      "forbidden_mutations": ["accepted-state-write", "runtime-scheduler-policy", "model-pin"],
      "required_worker_evidence": { "candidate_evidence": true, "implementer_output": true, "validation": true }
    }
  },
  {
    "id": "ah_behavior_gate_acceptance_requires_evidence",
    "skill": "harness:execute",
    "scenario": "Gate-only acceptance follows candidate verification and state-sync evidence.",
    "user_request": "Accept the durable Run only if all evidence is complete.",
    "trace": [
      { "type": "read", "target": "plugins/agent-harness/skills/execute/references/completion-evidence.md" },
      { "type": "worker_result", "target": "candidate result", "fields": { "candidate_evidence": true, "implementer_output": "patch", "validation": "test:all passed" } },
      { "type": "verification", "target": "controller verification", "fields": { "passed": true } },
      { "type": "gate_record", "target": "accepted gate", "markers": ["harness-rule:state-sync-evidence"], "fields": { "controller_acceptance": true, "implementer_output": "patch", "verification": "test:all passed", "state_sync": "verified" } }
    ],
    "assertions": {
      "required_ordered_reads": ["plugins/agent-harness/skills/execute/references/completion-evidence.md"],
      "forbidden_writes": [],
      "forbidden_mutations": ["accept-without-verification"],
      "required_gate_only_acceptance_evidence": { "controller_acceptance": true, "implementer_output": true, "verification": true }
    }
  },
  {
    "id": "ah_behavior_run_scoped_delivery",
    "skill": "harness:execute",
    "scenario": "Delivery evidence compares the Run start snapshot and current delta.",
    "user_request": "Record this Run as validated without inventing push evidence.",
    "trace": [
      { "type": "read", "target": ".harness/runs/example/status.json" },
      { "type": "verification", "target": "local validation", "markers": ["harness-rule:run-scoped-delivery", "harness-rule:local-delivery-ceiling"], "fields": { "passed": true, "head_changed": false, "push": "none" } },
      { "type": "state_transition", "target": "validated-local", "fields": { "accepted": false, "candidate_evidence": true } }
    ],
    "assertions": {
      "required_ordered_reads": [".harness/runs/example/status.json"],
