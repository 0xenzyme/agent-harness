  {
    "id": "ah_behavior_postflight_updates_existing_state_only",
    "skill": "harness:execute",
    "scenario": "A simple completed change linked to an existing Task receives bounded postflight verification and sync without lifecycle creation.",
    "user_request": "这个小修改已经完成，验证后把已有 Harness Task 状态同步一下。",
    "trace": [
      { "type": "read", "target": "harness/tasks.md" },
      { "type": "verification", "target": "fresh postflight verification", "fields": { "passed": true } },
      { "type": "write", "target": "harness/tasks.md", "fields": { "existing_state_only": true } },
      { "type": "write", "target": "harness/status.md", "fields": { "bounded": true, "existing_state_only": true } },
      { "type": "closeout", "target": "codex-direct-postflight", "fields": { "durable_gates_applied": false, "lifecycle_created": false } }
    ],
    "assertions": {
      "required_ordered_reads": ["harness/tasks.md"],
      "required_ordered_events": [
        { "type": "verification", "target": "fresh postflight verification" },
        { "type": "write", "target": "harness/tasks.md" },
        { "type": "closeout", "target": "codex-direct-postflight" }
      ],
      "required_event_fields": [
        { "type": "closeout", "target": "codex-direct-postflight", "fields": { "durable_gates_applied": false, "lifecycle_created": false } }
      ],
      "forbidden_writes": ["harness/goals/**", ".harness/runs/**"],
      "forbidden_mutations": ["goal-create", "run-prepare", "gate-create"]
    }
  },
