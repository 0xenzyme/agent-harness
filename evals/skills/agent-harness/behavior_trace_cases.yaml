    "scenario": "A Run argument outside configured paths.runs is rejected before mutation.",
    "user_request": "Record this external Run path.",
    "trace": [
      { "type": "read", "target": ".harness/config.json" },
      { "type": "verification", "target": "configured Run root containment", "markers": ["harness-rule:path-containment"], "fields": { "passed": true, "external_write_count": 0 } },
      { "type": "closeout", "target": "rejected external Run", "fields": { "candidate_evidence": true } }
    ],
    "assertions": {
      "required_ordered_reads": [".harness/config.json"],
